name: Clean consumer installs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archives:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.13", cache: pip }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: "1.92.0" }
      - run: npm ci
      - name: Install generated npm archive
        run: |
          archive="$(npm pack --silent --pack-destination "$RUNNER_TEMP")"
          mkdir "$RUNNER_TEMP/npm-consumer"
          cd "$RUNNER_TEMP/npm-consumer"
          npm init --yes >/dev/null
          npm install "$RUNNER_TEMP/$archive"
          node --input-type=module -e 'import { deriveAddress } from "wallet-hd-derivation-kit"; const words="abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"; const value=deriveAddress({mnemonic:words},{chain:"bitcoin"}); if(value.address!=="bc1qcr8te4kr609gcawutmrza0j4xv80jy8z306fyu") process.exit(1)'
      - name: Install generated Python wheel
        run: |
          python -m pip install build==1.3.0
          python -m build
          python -m venv "$RUNNER_TEMP/python-consumer"
          "$RUNNER_TEMP/python-consumer/bin/pip" install dist/*.whl
          "$RUNNER_TEMP/python-consumer/bin/python" -c 'from wallet_hd_derivation_kit import derive_address; words="abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"; assert derive_address({"mnemonic": words}, chain="ethereum")["address"] == "0x9858EfFD232B4033E47d90003D41EC34EcaEda94"'
      - name: Install generated Rust crate
        run: |
          cargo package --locked
          mkdir "$RUNNER_TEMP/rust-consumer"
          tar -xzf target/package/wallet-hd-derivation-kit-1.0.0.crate -C "$RUNNER_TEMP/rust-consumer"
          cargo install --locked --path "$RUNNER_TEMP/rust-consumer/wallet-hd-derivation-kit-1.0.0" --root "$RUNNER_TEMP/rust-install" --bin wallethd
          "$RUNNER_TEMP/rust-install/bin/wallethd" vectors verify

  native-consumers:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.25.x", cache: true }
      - uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with: { swift-version: "6.2" }
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - run: go run .
        working-directory: examples/go
      - run: dart pub get && dart run bin/main.dart
        working-directory: examples/dart
      - run: gradle --no-daemon publishToMavenLocal
      - run: gradle --no-daemon clean run
        working-directory: examples/kotlin
      - run: swift run --package-path examples/swift WalletHDExample
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with: { ruby-version: "3.3" }
      - run: gem install cocoapods --no-document
      - run: pod lib lint WalletHDDerivationKit.podspec --allow-warnings
