name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm test
      - run: npm run test:coverage
      - run: npm pack --dry-run
      - run: node examples/javascript/example.mjs
      - run: node examples/react-native/smoke-test.mjs

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.13", cache: pip }
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check python
      - run: pytest --cov=wallet_hd_derivation_kit --cov-fail-under=90 python/tests
      - run: python -m build
      - run: python examples/python/example.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: "rustfmt,llvm-tools-preview", toolchain: "1.92.0" }
      - run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      - run: cargo fmt --check
      - run: cargo test --locked --all-targets
      - run: cargo llvm-cov --locked --lib --fail-under-lines 90
      - run: cargo package --locked
      - run: cargo run --quiet --manifest-path examples/rust/Cargo.toml
      - run: cargo run --quiet --bin wallethd -- vectors verify

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.25.x", cache: true }
      - run: go test -race -coverprofile=coverage.out ./...
      - run: test "$(go tool cover -func=coverage.out | tail -1 | awk '{print int($3)}')" -ge 90
      - run: go vet ./...
      - run: go run .
        working-directory: examples/go

  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with: { sdk: stable }
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart test --coverage=coverage
      - run: dart run coverage:format_coverage --packages=.dart_tool/package_config.json --report-on=lib --in=coverage --out=coverage/lcov.info --lcov
      - run: |
          awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{coverage=100*lh/lf; printf "Dart line coverage %.2f%%\n",coverage; exit (coverage < 90)}' coverage/lcov.info
      - run: dart pub publish --dry-run
      - run: dart pub get && dart run bin/main.dart
        working-directory: examples/dart

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with: { channel: stable, cache: true }
      - run: flutter pub get
        working-directory: examples/flutter
      - run: flutter analyze
        working-directory: examples/flutter
      - run: flutter test
        working-directory: examples/flutter

  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - run: gradle --no-daemon test jacocoTestCoverageVerification publishToMavenLocal dokkaGeneratePublicationHtml
      - run: gradle --no-daemon run
        working-directory: examples/kotlin

  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with: { swift-version: "6.2" }
      - run: swift package dump-package >/dev/null
      - run: swift test --enable-code-coverage
      - run: |
          report="$(swift test --show-codecov-path)"
          coverage="$(jq '[.data[0].files[] | select(.filename | contains("/Sources/WalletHDDerivationKit/")) | .summary.lines] | (map(.covered) | add) * 100 / (map(.count) | add)' "$report")"
          printf 'Swift core line coverage %.2f%%\n' "$coverage"
          awk -v coverage="$coverage" 'BEGIN { exit (coverage < 90) }'
      - run: swift run --package-path examples/swift WalletHDExample
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with: { ruby-version: "3.3", bundler-cache: false }
      - run: gem install cocoapods --no-document
      - run: pod lib lint WalletHDDerivationKit.podspec --allow-warnings

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - shell: pwsh
        run: ./install.ps1 -DryRun -Version 1.0.0 -Prefix "$env:RUNNER_TEMP/wallethd"

  conformance:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.13" }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.25.x" }
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - run: npm ci && python -m pip install -e . && dart pub get
      - run: npm run conformance

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24 }
      - run: node scripts/check-versions.mjs
