name: Offline runtime proof

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  no-network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.13" }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.25.x" }
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - run: npm ci && python -m pip install -e . && go mod download && dart pub get && gradle --no-daemon classes prepareOfflineConformance
      - name: Build native conformance runners before disabling network access
        run: |
          go build -o /tmp/wallethd-go-conformance ./cmd/conformance
          dart compile exe tool/conformance.dart -o /tmp/wallethd-dart-conformance
      - run: cargo build --locked --release --bin wallethd
      - run: docker build -t wallethd-offline .
      - run: docker run --rm --network none wallethd-offline vectors verify
      - run: sudo unshare --net -- node javascript/test/conformance-runner.mjs
      - run: sudo unshare --net -- env PYTHONPATH="$PWD/python" "$(command -v python)" python/tests/conformance_runner.py
      - run: sudo unshare --net -- /tmp/wallethd-go-conformance
      - run: sudo unshare --net -- /tmp/wallethd-dart-conformance
      - name: Run compiled Kotlin conformance classes without network access
        run: |
          KOTLIN_CP="build/classes/kotlin/main:$(find build/offline-conformance/lib -type f -name '*.jar' -print | paste -sd: -)"
          sudo unshare --net -- "$JAVA_HOME/bin/java" -cp "$KOTLIN_CP" io.github.devdasx.wallethd.ConformanceKt

  swift-no-network:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with: { swift-version: "6.2" }
      - run: swift build --product WalletHDConformance
      - name: Run built Swift conformance binary without network access
        run: |
          BIN_PATH="$(swift build --show-bin-path)"
          sandbox-exec -p '(version 1) (allow default) (deny network*)' "$BIN_PATH/WalletHDConformance"
