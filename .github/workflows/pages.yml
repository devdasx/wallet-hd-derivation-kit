name: Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", "README.md", "llms*.txt", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.13" }
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: "1.92.0" }
      - uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with: { swift-version: "6.2" }
      - name: Add agent-readable package manifests
        run: cp llms.txt llms-full.txt docs/
      - run: npm ci && npx typedoc --entryPoints javascript/src/index.d.ts --out docs/api/javascript
      - run: python -m pip install -e . pdoc==16.0.0 && pdoc wallet_hd_derivation_kit -o docs/api/python
      - run: cargo doc --locked --no-deps && mkdir -p docs/api/rust && cp -R target/doc/. docs/api/rust/
      - run: dart pub get && dart doc --output docs/api/dart
      - run: gradle --no-daemon dokkaGeneratePublicationHtml && mkdir -p docs/api/kotlin && cp -R build/dokka/html/. docs/api/kotlin/
      - run: swift package --allow-writing-to-directory docs/api/swift generate-documentation --target WalletHDDerivationKit --output-path docs/api/swift --transform-for-static-hosting --hosting-base-path wallet-hd-derivation-kit/api/swift
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with: { ruby-version: "3.3" }
      - name: Install pinned Jekyll with the active macOS SDK
        run: |
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          export SDKROOT
          gem install jekyll -v 4.4.1 --no-document
      - run: jekyll build --source docs --destination _site
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with: { path: _site }
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
